# Development override — use together with docker-compose.build.yml:
#   docker compose -f docker-compose.build.yml -f docker-compose.dev.yml up
#
# This override:
#   - Enables --reload for backend hot-reload
#   - Mounts backend source code as volume (no rebuild on code change)
#   - Exposes backend port 8000 directly for API testing

services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    # Override healthcheck for faster dev iteration
    healthcheck:
      start_period: 30s
